<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            width: 320px;
            padding: 16px;
            font-family: 'Inter', system-ui, sans-serif;
            color: #1e293b;
            margin: 0;
        }

        .ext-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .ext-logo {
            width: 32px;
            height: 32px;
            background: #f97316;
            border-radius: 8px;
        }

        h2 {
            margin: 0;
            font-size: 16px;
            font-weight: 700;
            color: #0f172a;
        }

        .status-card {
            background: #f8fafc;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            margin-bottom: 16px;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
        }

        .active-user {
            font-weight: 600;
            font-size: 13px;
        }

        .btn {
            width: 100%;
            padding: 10px;
            background: #f97316;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            background: #ea580c;
        }

        .btn-secondary {
            background: white;
            color: #475569;
            border: 1px solid #e2e8f0;
            margin-top: 8px;
        }

        .btn-secondary:hover {
            background: #f8fafc;
        }

        .footer {
            font-size: 11px;
            color: #94a3b8;
            text-align: center;
            margin-top: 16px;
        }

        input {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            margin-bottom: 12px;
            font-size: 12px;
        }
    </style>
</head>

<body>
    <div class="ext-header">
        <div class="ext-logo"></div>
        <div>
            <h2>ScholarMatch Co-Pilot</h2>
            <p style="font-size: 10px; margin:0; color: #64748b;">Bridge the Gap</p>
        </div>
    </div>

    <div id="logged-in-view" style="display: none;">
        <div class="status-card">
            <div class="status">
                <div class="dot"></div>
                <span>Authenticated</span>
            </div>
            <div class="active-user" id="user-display">Loading profile...</div>
        </div>
        <button class="btn" id="toggle-sidebar">Show Data on Portal</button>
        <button class="btn btn-secondary" id="logout-btn">Disconnect Account</button>
    </div>

    <div id="logged-out-view">
        <p style="font-size: 12px; color: #475569; line-height: 1.5;">Paste your Secure Token to bridge data onto
            government portals.</p>
        <input type="text" id="user-id-input" placeholder="Paste your Secure Sync Token here">
        <button class="btn" id="login-btn">Secure Connect</button>
        <p style="font-size: 10px; color: #94a3b8; margin-top: 8px;">(You can find your Token on your Dashboard page)
        </p>
    </div>

    <div class="footer">
        Helping students win scholarships.
    </div>

    <script src="popup.js"></script>
</body>

</html>
